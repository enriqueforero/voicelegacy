name: CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**', 'refactor/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test-and-quality:
    name: Python ${{ matrix.python-version }} quality gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install CPU-only torch for lightweight test imports
        run: pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate pyproject.toml parses
        run: python -c "import tomllib; tomllib.load(open('pyproject.toml','rb'))"

      - name: Validate all generated notebooks
        run: |
          for gen in notebooks/build_notebook.py \
                     notebooks/build_finetune_notebook.py \
                     notebooks/build_finetune_standalone_notebook.py \
                     notebooks/build_bridge_notebook.py; do
            echo "=== $gen ==="
            python "$gen"
          done
          for nb in notebooks/*.ipynb; do
            python scripts/check_notebook_schema.py "$nb"
            python scripts/check_no_runtime_unassign.py "$nb"
          done

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Test with coverage
        run: python -m pytest -q
